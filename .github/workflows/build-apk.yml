name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      pwa_url:
        description: 'URL HTTPS de la PWA déployée'
        required: true
        default: 'https://chimie-piscine.vercel.app'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Determine PWA URL
        id: url
        run: |
          if [ -n "${{ github.event.inputs.pwa_url }}" ]; then
            echo "url=${{ github.event.inputs.pwa_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ vars.PWA_URL || 'https://chimie-piscine.vercel.app' }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "name=1.3.0" >> $GITHUB_OUTPUT
          fi
          echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Generate signing keystore
        run: |
          mkdir -p android-build
          cd android-build
          keytool -genkey -v -keystore android.keystore \
            -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass chimiepiscine -keypass chimiepiscine \
            -dname "CN=Yannick Uhrig, OU=Personal, O=YU, L=Moselle, S=Grand Est, C=FR"

      - name: Pre-configure Bubblewrap (skip JDK/SDK install prompts)
        run: |
          SDK_PATH="${ANDROID_HOME:-/usr/local/lib/android/sdk}"

          echo "--- ANDROID_HOME contents ---"
          ls -la "$SDK_PATH" | head -15
          echo "--- cmdline-tools contents ---"
          ls -la "$SDK_PATH/cmdline-tools" || true

          # Bubblewrap exige $SDK/cmdline-tools/latest/bin/sdkmanager mais le runner
          # n'expose que des sous-répertoires versionnés (ex 16.0, 19.0). On crée
          # le symlink "latest" vers la version la plus récente.
          if [ ! -d "$SDK_PATH/cmdline-tools/latest" ]; then
            cd "$SDK_PATH/cmdline-tools"
            LATEST_VER=$(ls -d */ 2>/dev/null | grep -v "^latest/$" | sort -rV | head -1 | tr -d /)
            echo "Symlinking cmdline-tools/latest -> $LATEST_VER"
            if [ -n "$LATEST_VER" ]; then
              ln -sf "$LATEST_VER" latest
            fi
            cd -
          fi
          ls -la "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" || \
            (echo "ERREUR : sdkmanager introuvable" && exit 1)

          # `bubblewrap build` valide l'existence de $SDK/tools/bin/sdkmanager
          # (emplacement "tools" legacy, supprimé des runners GitHub qui n'ont plus
          # que cmdline-tools). On symlink tools -> cmdline-tools/latest pour que la
          # validation AndroidSdkTools.create() passe.
          if [ ! -e "$SDK_PATH/tools" ]; then
            ln -sf "$SDK_PATH/cmdline-tools/latest" "$SDK_PATH/tools"
            echo "Symlinking tools -> cmdline-tools/latest"
          fi
          ls -la "$SDK_PATH/tools/bin/sdkmanager" || echo "WARN: tools/bin/sdkmanager absent"

          # Bubblewrap exige EXACTEMENT build-tools/34.0.0 (version codée en dur
          # dans SUPPORTED_BUILD_TOOLS_VERSION). Les runners n'ont que des versions
          # plus récentes → on installe la 34.0.0 + platform-34 via sdkmanager.
          SDKMANAGER="$SDK_PATH/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-34" "platform-tools" || \
            (echo "ERREUR : installation build-tools 34.0.0 échouée" && exit 1)
          ls -la "$SDK_PATH/build-tools/34.0.0/aapt2" || echo "WARN: aapt2 absent"

          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "$SDK_PATH"
          }
          EOF
          echo "--- ~/.bubblewrap/config.json ---"
          cat ~/.bubblewrap/config.json

          # Gradle en CI : daemon désactivé (sinon il reste suspendu et le step pend),
          # console plain (pas d'animations/curseur), pas de watch fs.
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<EOF
          org.gradle.daemon=false
          org.gradle.console=plain
          org.gradle.vfs.watch=false
          org.gradle.welcome=never
          EOF
          echo "--- ~/.gradle/gradle.properties ---"
          cat ~/.gradle/gradle.properties

      - name: Initialize Bubblewrap project
        working-directory: android-build
        run: |
          HOST=$(echo "${{ steps.url.outputs.url }}" | sed 's|https://||;s|/.*||')

          # Backup file : init va écraser twa-manifest.json, on le restaurera après.
          cat > twa-manifest-custom.json <<EOF
          {
            "packageId": "fr.yannickuhrig.chimiepiscine",
            "host": "$HOST",
            "name": "Chimie Piscine",
            "launcherName": "Piscine",
            "display": "standalone",
            "themeColor": "#0a3d62",
            "navigationColor": "#0a3d62",
            "navigationColorDark": "#041d2e",
            "navigationDividerColor": "#0a3d62",
            "navigationDividerColorDark": "#041d2e",
            "backgroundColor": "#041d2e",
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": true,
            "startUrl": "/index.html",
            "iconUrl": "${{ steps.url.outputs.url }}/icon-512.png",
            "maskableIconUrl": "${{ steps.url.outputs.url }}/icon-512.png",
            "appVersionName": "${{ steps.ver.outputs.name }}",
            "appVersionCode": ${{ steps.ver.outputs.code }},
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "${{ steps.url.outputs.url }}/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "${{ steps.url.outputs.url }}/",
            "minSdkVersion": 21,
            "orientation": "portrait",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            }
          }
          EOF

          # Bubblewrap init : stdin fermé → inquirer prend les defaults issus du
          # web manifest (ne PAS faire `yes |`, ça injecte "y" dans les champs texte
          # et casse le packageId). Génère le squelette du projet Android (gradlew…).
          bubblewrap init --manifest="${{ steps.url.outputs.url }}/manifest.json" --directory=. </dev/null || true

          # Restaure notre manifest custom (écrasement de celui généré par init)
          cp twa-manifest-custom.json twa-manifest.json

          # Régénère le projet Android à partir de notre manifest custom.
          # --skipVersionUpgrade est ESSENTIEL : sinon, comme appVersionName
          # ("1.22.3") != appVersionCode ("84"), bubblewrap prompte le versionName
          # (validation longueur >=1). Avec stdin fermé/`yes ""` → boucle infinie
          # (input vide rejeté à l'infini) jusqu'au timeout. Le flag saute ce bloc.
          # `update` écrit aussi manifest-checksum.txt (sha1 du manifest) → `build`
          # ne reposera plus la question "regenerate?".
          bubblewrap update --skipVersionUpgrade </dev/null

          # Filet de sécurité : garantit que le checksum existe et correspond
          # (sha1 hex du contenu de twa-manifest.json), même si update changeait.
          node -e "const c=require('crypto'),f=require('fs');f.writeFileSync('manifest-checksum.txt',c.createHash('sha1').update(f.readFileSync('twa-manifest.json')).digest('hex'))"
          echo "--- manifest-checksum.txt ---"; cat manifest-checksum.txt; echo
          echo "--- gradlew présent ? ---"; ls -la gradlew

      - name: Build APK
        working-directory: android-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: chimiepiscine
          BUBBLEWRAP_KEY_PASSWORD: chimiepiscine
        run: |
          # Le manifest-checksum.txt généré à l'étape précédente correspond au
          # twa-manifest.json → `build` ne pose AUCUN prompt "regenerate?" et
          # compile directement le projet déjà généré. stdin fermé par sûreté.
          # `timeout` garde-fou : échec propre (libère les logs) si Gradle bloque.
          set -o pipefail
          timeout 1200 bubblewrap build --skipPwaValidation </dev/null || {
            code=$?
            echo "::error::bubblewrap build a échoué/timeout (code $code)"
            echo "=== gradlew présent ? ==="; ls -la gradlew 2>&1 || true
            echo "=== build/outputs ==="; find . -path "*outputs*" -name "*.apk" -o -path "*outputs*" -name "*.aab" 2>/dev/null | head
            exit $code
          }

      - name: Find APK
        id: find_apk
        working-directory: android-build
        run: |
          APK=$(find . -name "*.apk" -not -path "*/build/intermediates/*" | head -1)
          echo "Found: $APK"
          echo "apk_path=android-build/$APK" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chimie-piscine-apk
          path: android-build/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB (for Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: chimie-piscine-aab
          path: android-build/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-build/*.apk
            android-build/*.aab
          generate_release_notes: true
