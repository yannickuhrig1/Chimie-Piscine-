name: Lint

on:
  push:
    branches: [main]
    paths:
      - '**.js'
      - '.eslintrc.json'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**.js'
      - '.eslintrc.json'

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-save eslint@8
      - run: npx eslint app.js sw.js
