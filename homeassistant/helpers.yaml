# Helpers à créer dans Home Assistant pour la vue "Style PWA".
# Soit via UI : Paramètres → Appareils & Services → Helpers → Créer un helper → Nombre.
# Soit via configuration.yaml : ajouter ce bloc puis Recharger la configuration YAML.

input_number:
  bassin_volume:
    name: Volume bassin
    icon: mdi:pool
    min: 1
    max: 200
    step: 0.5
    initial: 43
    unit_of_measurement: "m³"
    mode: box

  bassin_ph_souhaite:
    name: pH souhaité
    icon: mdi:flask-outline
    min: 6.8
    max: 7.6
    step: 0.1
    initial: 7.2
    mode: slider

  bassin_tac_souhaite:
    name: TAC souhaité
    icon: mdi:gauge
    min: 60
    max: 150
    step: 5
    initial: 80
    unit_of_measurement: "ppm"
    mode: slider
